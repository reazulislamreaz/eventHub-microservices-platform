"""
EventHub GraphQL API — production event ticketing platform.
"""
directive @auth on FIELD_DEFINITION
directive @hasRole(role: String!) on FIELD_DEFINITION

type User {
  id: ID!
  email: String!
  name: String!
  role: String!
  createdAt: String!
}

type Event {
  id: ID!
  title: String!
  description: String!
  location: String!
  startTime: String!
  endTime: String!
  capacity: Int!
  availableSeats: Int!
  status: String!
  createdBy: ID!
  createdAt: String!
}

type EventPage {
  events: [Event!]!
  total: Int!
  page: Int!
  pageSize: Int!
}

type Ticket {
  id: ID!
  userId: ID!
  eventId: ID!
  status: String!
  ticketCode: String!
  createdAt: String!
}

type AuthPayload {
  token: String!
  user: User!
}

input RegisterInput {
  email: String!
  name: String!
  password: String!
}

input LoginInput {
  email: String!
  password: String!
}

input CreateEventInput {
  title: String!
  description: String!
  location: String!
  startTime: String!
  endTime: String!
  capacity: Int!
}

input UpdateProfileInput {
  name: String!
}

type Query {
  getUsers: [User!]!
  getUser(id: ID!): User
  getEvent(id: ID!): Event
  getEvents(page: Int, pageSize: Int, search: String, location: String, status: String): EventPage!
  getTicketsByUser(userId: ID!): [Ticket!]! @auth
}

type Mutation {
  register(input: RegisterInput!): AuthPayload!
  login(input: LoginInput!): AuthPayload!
  updateProfile(input: UpdateProfileInput!): User! @auth
  createEvent(input: CreateEventInput!): Event! @auth @hasRole(role: "admin")
  cancelEvent(id: ID!): Event! @auth @hasRole(role: "admin")
  bookTicket(eventId: ID!): Ticket! @auth
  cancelTicket(ticketId: ID!): Ticket! @auth
}
