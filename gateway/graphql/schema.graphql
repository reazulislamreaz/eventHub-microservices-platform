"""
EventHub GraphQL API — production event ticketing platform.
"""
directive @auth on FIELD_DEFINITION
directive @hasRole(role: String!) on FIELD_DEFINITION

type User {
  id: ID!
  email: String!
  name: String!
  role: String!
  createdAt: String!
}

type Event {
  id: ID!
  title: String!
  description: String!
  location: String!
  category: String!
  priceCents: Int!
  startTime: String!
  endTime: String!
  capacity: Int!
  availableSeats: Int!
  status: String!
  createdBy: ID!
  createdAt: String!
}

type EventPage {
  events: [Event!]!
  total: Int!
  page: Int!
  pageSize: Int!
}

type Ticket {
  id: ID!
  userId: ID!
  eventId: ID!
  status: String!
  ticketCode: String!
  createdAt: String!
  checkedInAt: String
}

type WaitlistEntry {
  id: ID!
  userId: ID!
  eventId: ID!
  createdAt: String!
}

type EventStats {
  totalEvents: Int!
  publishedEvents: Int!
  cancelledEvents: Int!
  totalCapacity: Int!
  seatsAvailable: Int!
}

type TicketStats {
  totalTickets: Int!
  confirmedTickets: Int!
  checkedInTickets: Int!
  waitlistEntries: Int!
}

type UserStats {
  totalUsers: Int!
  adminUsers: Int!
}

type PlatformStats {
  users: UserStats!
  events: EventStats!
  tickets: TicketStats!
}

type AuthPayload {
  token: String!
  user: User!
}

input RegisterInput {
  email: String!
  name: String!
  password: String!
}

input LoginInput {
  email: String!
  password: String!
}

input CreateEventInput {
  title: String!
  description: String!
  location: String!
  category: String
  priceCents: Int
  startTime: String!
  endTime: String!
  capacity: Int!
}

input UpdateProfileInput {
  name: String!
}

type Query {
  getUsers: [User!]!
  getUser(id: ID!): User
  getEvent(id: ID!): Event
  getEvents(page: Int, pageSize: Int, search: String, location: String, status: String, category: String): EventPage!
  getTicketsByUser(userId: ID!): [Ticket!]! @auth
  verifyTicket(ticketCode: String!): Ticket! @auth
  platformStats: PlatformStats! @auth @hasRole(role: "admin")
}

type Mutation {
  register(input: RegisterInput!): AuthPayload!
  login(input: LoginInput!): AuthPayload!
  updateProfile(input: UpdateProfileInput!): User! @auth
  createEvent(input: CreateEventInput!): Event! @auth @hasRole(role: "admin")
  cancelEvent(id: ID!): Event! @auth @hasRole(role: "admin")
  bookTicket(eventId: ID!): Ticket! @auth
  cancelTicket(ticketId: ID!): Ticket! @auth
  joinWaitlist(eventId: ID!): WaitlistEntry! @auth
  checkInTicket(ticketCode: String!): Ticket! @auth @hasRole(role: "admin")
}
