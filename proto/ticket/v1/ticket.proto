syntax = "proto3";

package ticket.v1;

option go_package = "github.com/eventhub/proto/gen/ticket/v1;ticketv1";

service TicketService {
  rpc CreateTicket(CreateTicketRequest) returns (CreateTicketResponse);
  rpc CancelTicket(CancelTicketRequest) returns (CancelTicketResponse);
  rpc GetTicketsByUser(GetTicketsByUserRequest) returns (GetTicketsByUserResponse);
  rpc GetTicket(GetTicketRequest) returns (GetTicketResponse);
  rpc GetTicketByCode(GetTicketByCodeRequest) returns (GetTicketByCodeResponse);
  rpc CheckInTicket(CheckInTicketRequest) returns (CheckInTicketResponse);
  rpc JoinWaitlist(JoinWaitlistRequest) returns (JoinWaitlistResponse);
  rpc GetTicketStats(GetTicketStatsRequest) returns (GetTicketStatsResponse);
}

message Ticket {
  string id = 1;
  string user_id = 2;
  string event_id = 3;
  string status = 4;
  string ticket_code = 5;
  string created_at = 6;
  string checked_in_at = 7;
}

message WaitlistEntry {
  string id = 1;
  string user_id = 2;
  string event_id = 3;
  string created_at = 4;
}

message CreateTicketRequest {
  string user_id = 1;
  string event_id = 2;
}

message CreateTicketResponse {
  Ticket ticket = 1;
}

message CancelTicketRequest {
  string id = 1;
  string user_id = 2;
}

message CancelTicketResponse {
  Ticket ticket = 1;
}

message GetTicketsByUserRequest {
  string user_id = 1;
}

message GetTicketsByUserResponse {
  repeated Ticket tickets = 1;
}

message GetTicketRequest {
  string id = 1;
}

message GetTicketResponse {
  Ticket ticket = 1;
}

message GetTicketByCodeRequest {
  string ticket_code = 1;
}

message GetTicketByCodeResponse {
  Ticket ticket = 1;
}

message CheckInTicketRequest {
  string ticket_code = 1;
}

message CheckInTicketResponse {
  Ticket ticket = 1;
}

message JoinWaitlistRequest {
  string user_id = 1;
  string event_id = 2;
}

message JoinWaitlistResponse {
  WaitlistEntry entry = 1;
}

message GetTicketStatsRequest {}

message GetTicketStatsResponse {
  int32 total_tickets = 1;
  int32 confirmed_tickets = 2;
  int32 checked_in_tickets = 3;
  int32 waitlist_entries = 4;
}
