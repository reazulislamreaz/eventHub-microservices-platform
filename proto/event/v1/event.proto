syntax = "proto3";

package event.v1;

option go_package = "github.com/eventhub/proto/gen/event/v1;eventv1";

service EventService {
  rpc CreateEvent(CreateEventRequest) returns (CreateEventResponse);
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
  rpc GetEvent(GetEventRequest) returns (GetEventResponse);
  rpc ReserveSeat(ReserveSeatRequest) returns (ReserveSeatResponse);
  rpc ReleaseSeat(ReleaseSeatRequest) returns (ReleaseSeatResponse);
}

message Event {
  string id = 1;
  string title = 2;
  string description = 3;
  string location = 4;
  string start_time = 5;
  string end_time = 6;
  int32 capacity = 7;
  int32 available_seats = 8;
  string created_by = 9;
  string created_at = 10;
}

message CreateEventRequest {
  string title = 1;
  string description = 2;
  string location = 3;
  string start_time = 4;
  string end_time = 5;
  int32 capacity = 6;
  string created_by = 7;
}

message CreateEventResponse {
  Event event = 1;
}

message ListEventsRequest {}

message ListEventsResponse {
  repeated Event events = 1;
}

message GetEventRequest {
  string id = 1;
}

message GetEventResponse {
  Event event = 1;
}

message ReserveSeatRequest {
  string event_id = 1;
}

message ReserveSeatResponse {
  bool success = 1;
  int32 available_seats = 2;
}

message ReleaseSeatRequest {
  string event_id = 1;
}

message ReleaseSeatResponse {
  bool success = 1;
  int32 available_seats = 2;
}
